# Commands and Apps to be executed at launch

# Restore last wallpaper after swww-daemon starts
exec-once = sleep 1 && swww img $HOME/.config/hypr/wallpaper_effects/.wallpaper_current

# Warp cursor to center of Acer monitor (4K @ 1.25 scale, logical pos 2560,0, size 3072x1728) on startup
exec-once = sleep 1 && hyprctl dispatch movecursor 4096 864
